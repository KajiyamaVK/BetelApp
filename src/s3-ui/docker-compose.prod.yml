services:
  app:
    build:
      context: .
      target: runner
    image: s3-ui-app
    ports:
      - "3001:3000"
    env_file:
      - .env.production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  # Run with: docker compose --profile migrate run --rm migrator
  migrator:
    build:
      context: .
      target: migrator
    image: s3-ui-migrator
    env_file:
      - .env.production
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles:
      - migrate
